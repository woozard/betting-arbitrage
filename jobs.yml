jobs:
  - name: arbitrage
    script: arbitrage.py
    interval_seconds: 30
    start_offset_seconds: 0

  - name: sports411_odds
    script: sports411_odds.py
    interval_seconds: 20
    start_offset_seconds: 0

  # Betamapola/BetWar/Paradise odds polled from each book's betting loop (same session).
  # Standalone watch_odds() remains in *_odds.py for manual runs.

  - name: polymarket_odds
    script: polymarket_odds.py
    interval_seconds: 20
    start_offset_seconds: 13

  - name: sports411_betting
    script: sports411_betting.py
    interval_seconds: 30
    start_offset_seconds: 15

  - name: paradisewager_betting
    script: paradisewager_betting.py
    interval_seconds: 30
    start_offset_seconds: 20

  - name: betamapola_betting
    script: betamapola_betting.py
    interval_seconds: 30
    start_offset_seconds: 30

  - name: betwar_betting
    script: betwar_betting.py
    interval_seconds: 30
    start_offset_seconds: 35

  - name: telegram_ops_bot
    script: telegram_ops_bot.py
    interval_seconds: 300
    start_offset_seconds: 0
